version: 2

# https://docs.socket.dev/docs/socket-yml

issues:
  cve:
    action: error
  malware:
    action: error
  protestware:
    action: error
  new-author:
    action: warn
  install-scripts:
    action: warn
  telemetry:
    action: warn

# @noble/post-quantum — no transitive deps, audited by Cure53 (2024).
ignore:
  - "@noble/post-quantum"
